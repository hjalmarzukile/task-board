name: Handle task claim from common board

on:
  issue_comment:
    types: [created]

jobs:
  handle-claim:
    if: contains(github.event.comment.body, '/claim')
    runs-on: ubuntu-latest
    steps:
      - name: Assign student, grant access, create inbox entry
        env:
          GH_TOKEN: ${{ secrets.ORG_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_URL: ${{ github.event.issue.html_url }}
          CLAIMANT: ${{ github.event.comment.user.login }}
          REPO: ${{ github.repository }}
        run: |
          echo "Claim by $CLAIMANT on issue #$ISSUE_NUMBER"

          # 1. Assign the claimant to the issue
          curl -s -X POST \
            -H "Authorization: token $GH_TOKEN" \
            -H "Content-Type: application/json" \
            "https://api.github.com/repos/${REPO}/issues/${ISSUE_NUMBER}/assignees" \
            -d "{\"assignees\": [\"${CLAIMANT}\"]}"

          # 2. Label as claimed, remove available
          curl -s -X POST \
            -H "Authorization: token $GH_TOKEN" \
            -H "Content-Type: application/json" \
            "https://api.github.com/repos/${REPO}/issues/${ISSUE_NUMBER}/labels" \
            -d '{"labels": ["claimed"]}'

          curl -s -X DELETE \
            -H "Authorization: token $GH_TOKEN" \
            "https://api.github.com/repos/${REPO}/issues/${ISSUE_NUMBER}/labels/available"

          # 3. Grant claimant push access to AInterview_litreview
          curl -s -X PUT \
            -H "Authorization: token $GH_TOKEN" \
            -H "Content-Type: application/json" \
            "https://api.github.com/repos/hjalmarzukile/AInterview_litreview/collaborators/${CLAIMANT}" \
            -d '{"permission": "push"}'

          # 4. Create task file in student inbox
          INBOX_REPO="hjalmarzukile/inbox-${CLAIMANT}"
          SLUG=$(echo "$ISSUE_TITLE" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9]/-/g' | cut -c1-40)
          FILENAME="tb${ISSUE_NUMBER}_${SLUG}.md"
          DATE=$(date +%Y-%m-%d)

          CONTENT="# Task: ${ISSUE_TITLE}
          Source: task-board#${ISSUE_NUMBER}
          URL: ${ISSUE_URL}
          Claimed: ${DATE}

          ## Description
          ${ISSUE_BODY}

          ## Status
          - [ ] In progress
          - [ ] Ready for review
          "

          ENCODED=$(echo "$CONTENT" | base64 -w 0)

          curl -s -X PUT \
            -H "Authorization: token $GH_TOKEN" \
            -H "Content-Type: application/json" \
            "https://api.github.com/repos/${INBOX_REPO}/contents/tasks/open/${FILENAME}" \
            -d "{\"message\": \"task: claimed tb#${ISSUE_NUMBER} from task-board\", \"content\": \"${ENCODED}\"}" \
            | python3 -c "import json,sys; d=json.load(sys.stdin); print('inbox:', d.get('content',{}).get('html_url', d.get('message','created')))"

          # 5. Confirm in comment
          curl -s -X POST \
            -H "Authorization: token $GH_TOKEN" \
            -H "Content-Type: application/json" \
            "https://api.github.com/repos/${REPO}/issues/${ISSUE_NUMBER}/comments" \
            -d "{\"body\": \"@${CLAIMANT} — task claimed. You have been granted access to [AInterview_litreview](https://github.com/hjalmarzukile/AInterview_litreview) and a task file has been created in your inbox. Good luck!\"}"
